name: terraform

on:
  pull_request:
    paths:
      - ".github/workflows/terraform.yml"
      - ".terraform-version"
      - ".terraform.lock.hcl"
      - ".terraform-docs.yml"
      - ".tflint.hcl"
      - "README.md"
      - "components.tfcomponent.hcl"
      - "deployments.tfdeploy.hcl"
      - "providers.tfcomponent.hcl"
      - "variables.tfcomponent.hcl"
      - "components/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform.yml"
      - ".terraform-version"
      - ".terraform.lock.hcl"
      - ".terraform-docs.yml"
      - ".tflint.hcl"
      - "README.md"
      - "components.tfcomponent.hcl"
      - "deployments.tfdeploy.hcl"
      - "providers.tfcomponent.hcl"
      - "variables.tfcomponent.hcl"
      - "components/**"

permissions:
  contents: read

env:
  TF_VERSION: "1.14.8"

jobs:
  quality:
    name: quality-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.20.0/terraform-docs-v0.20.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz terraform-docs
          sudo mv terraform-docs /usr/local/bin/terraform-docs

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

      - name: Validate component module
        working-directory: components/environment
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate stack
        run: |
          terraform stacks init
          terraform stacks validate
