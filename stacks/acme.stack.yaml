# Terraform Cloud Stack definition for Azure environment deployments
# Reference: https://developer.hashicorp.com/terraform/cloud-docs/stack

stack:
  name = "acme"
  description = "Azure environment stack provisioning dev and prod environments"

  # Component deployments
  deployments:
    dev:
      component:
        source: ../components/environment
      workspace:
        name: acme-dev
        description: "Development environment in East US"
        tags: ["azure-terraform-interview", "dev"]
      variables:
        # Required
        environment: "dev"
        location: "eastus"
        location_short: "eus"
        address_space: ["10.10.0.0/16"]
        workload_subnet_cidr: "10.10.1.0/24"
        private_subnet_cidr: "10.10.2.0/24"
        admin_ssh_public_key: "${var.admin_ssh_public_key}"
        
        # Optional with defaults
        project_name: "acme"
        vm_size: "Standard_B2s"
        admin_username: "azureuser"
        admin_cidrs: "${var.admin_cidrs_dev}"
        enable_public_ip: true
        storage_container_name: "appdata"
        ddos_protection_plan_id: null
        extra_tags: {}

    prod:
      component:
        source: ../components/environment
      workspace:
        name: acme-prod
        description: "Production environment in West Europe"
        tags: ["azure-terraform-interview", "prod"]
      variables:
        # Required
        environment: "prod"
        location: "westeurope"
        location_short: "weu"
        address_space: ["10.20.0.0/16"]
        workload_subnet_cidr: "10.20.1.0/24"
        private_subnet_cidr: "10.20.2.0/24"
        admin_ssh_public_key: "${var.admin_ssh_public_key}"
        
        # Optional with defaults
        project_name: "acme"
        vm_size: "Standard_B2s"
        admin_username: "azureuser"
        admin_cidrs: []
        enable_public_ip: false
        storage_container_name: "appdata"
        ddos_protection_plan_id: null
        extra_tags: {}

  # Stack-level variables (configured in Terraform Cloud or via environment)
  variables:
    admin_ssh_public_key:
      description: "SSH public key for VM access"
      type: string
      sensitive: true
    admin_cidrs_dev:
      description: "CIDR ranges allowed to SSH into dev VM"
      type: list(string)
      default: ["203.0.113.10/32"]
